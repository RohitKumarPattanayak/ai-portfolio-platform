<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="stack" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="opt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="tools" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="outcome" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <filter id="soft2" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feOffset dx="0" dy="2" result="o"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="780" fill="url(#bg)"/>

  <!-- Title -->
  <text x="600" y="42" text-anchor="middle" fill="#f8fafc" font-size="24" font-weight="700">Frontend Architecture &amp; Optimization Pipeline</text>
  <text x="600" y="68" text-anchor="middle" fill="#94a3b8" font-size="13">React · Vite · TanStack Query · Zustand · Tailwind</text>

  <!-- ===== LAYER 1: CORE STACK ===== -->
  <text x="60" y="110" fill="#67e8f9" font-size="13" font-weight="700">CORE STACK</text>
  <rect x="50" y="118" width="6" height="120" fill="url(#stack)" rx="3"/>

  <g filter="url(#soft2)">
    <rect x="80" y="130" width="155" height="95" rx="12" fill="url(#stack)"/>
    <text x="157" y="158" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">React + TypeScript</text>
    <text x="157" y="180" text-anchor="middle" fill="#cffafe" font-size="11">component tree</text>
    <text x="157" y="197" text-anchor="middle" fill="#cffafe" font-size="11">strict types</text>
    <text x="157" y="214" text-anchor="middle" fill="#cffafe" font-size="11">router-based pages</text>
  </g>

  <g filter="url(#soft2)">
    <rect x="260" y="130" width="155" height="95" rx="12" fill="url(#stack)"/>
    <text x="337" y="158" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">Vite</text>
    <text x="337" y="180" text-anchor="middle" fill="#cffafe" font-size="11">dev server · HMR</text>
    <text x="337" y="197" text-anchor="middle" fill="#cffafe" font-size="11">Rollup production</text>
    <text x="337" y="214" text-anchor="middle" fill="#cffafe" font-size="11">build pipeline</text>
  </g>

  <g filter="url(#soft2)">
    <rect x="440" y="130" width="155" height="95" rx="12" fill="url(#stack)"/>
    <text x="517" y="158" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">TanStack Query</text>
    <text x="517" y="180" text-anchor="middle" fill="#cffafe" font-size="11">server state</text>
    <text x="517" y="197" text-anchor="middle" fill="#cffafe" font-size="11">cache · retries</text>
    <text x="517" y="214" text-anchor="middle" fill="#cffafe" font-size="11">background refetch</text>
  </g>

  <g filter="url(#soft2)">
    <rect x="620" y="130" width="155" height="95" rx="12" fill="url(#stack)"/>
    <text x="697" y="158" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">Zustand</text>
    <text x="697" y="180" text-anchor="middle" fill="#cffafe" font-size="11">client state</text>
    <text x="697" y="197" text-anchor="middle" fill="#cffafe" font-size="11">slice-based</text>
    <text x="697" y="214" text-anchor="middle" fill="#cffafe" font-size="11">selector pattern</text>
  </g>

  <g filter="url(#soft2)">
    <rect x="800" y="130" width="155" height="95" rx="12" fill="url(#stack)"/>
    <text x="877" y="158" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">Tailwind CSS</text>
    <text x="877" y="180" text-anchor="middle" fill="#cffafe" font-size="11">utility-first</text>
    <text x="877" y="197" text-anchor="middle" fill="#cffafe" font-size="11">purged output</text>
    <text x="877" y="214" text-anchor="middle" fill="#cffafe" font-size="11">low CSS overhead</text>
  </g>

  <g filter="url(#soft2)">
    <rect x="980" y="130" width="155" height="95" rx="12" fill="url(#stack)"/>
    <text x="1057" y="158" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">Recharts</text>
    <text x="1057" y="180" text-anchor="middle" fill="#cffafe" font-size="11">data viz</text>
    <text x="1057" y="197" text-anchor="middle" fill="#cffafe" font-size="11">lazy-loaded</text>
    <text x="1057" y="214" text-anchor="middle" fill="#cffafe" font-size="11">on demand</text>
  </g>

  <!-- Down arrow -->
  <path d="M 600 240 L 600 270" stroke="#94a3b8" stroke-width="2" marker-end="url(#ar)"/>

  <!-- ===== LAYER 2: ANALYSIS TOOLS ===== -->
  <text x="60" y="290" fill="#fbbf24" font-size="13" font-weight="700">ANALYSIS &amp; PROFILING TOOLS</text>
  <rect x="50" y="298" width="6" height="95" fill="url(#tools)" rx="3"/>

  <g filter="url(#soft2)">
    <rect x="80" y="305" width="200" height="80" rx="12" fill="url(#tools)"/>
    <text x="180" y="333" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">react-scan</text>
    <text x="180" y="354" text-anchor="middle" fill="#fff7ed" font-size="11">detect unneeded re-renders</text>
    <text x="180" y="371" text-anchor="middle" fill="#fff7ed" font-size="11">ensure smooth FPS</text>
  </g>

  <g filter="url(#soft2)">
    <rect x="300" y="305" width="200" height="80" rx="12" fill="url(#tools)"/>
    <text x="400" y="333" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">React Profiler</text>
    <text x="400" y="354" text-anchor="middle" fill="#fff7ed" font-size="11">component render time</text>
    <text x="400" y="371" text-anchor="middle" fill="#fff7ed" font-size="11">identify heavy nodes</text>
  </g>

  <g filter="url(#soft2)">
    <rect x="520" y="305" width="200" height="80" rx="12" fill="url(#tools)"/>
    <text x="620" y="333" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">Lighthouse</text>
    <text x="620" y="354" text-anchor="middle" fill="#fff7ed" font-size="11">Core Web Vitals</text>
    <text x="620" y="371" text-anchor="middle" fill="#fff7ed" font-size="11">LCP · CLS · TBT audits</text>
  </g>

  <g filter="url(#soft2)">
    <rect x="740" y="305" width="240" height="80" rx="12" fill="url(#tools)"/>
    <text x="860" y="333" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">rollup-plugin-visualizer</text>
    <text x="860" y="354" text-anchor="middle" fill="#fff7ed" font-size="11">bundle breakdown</text>
    <text x="860" y="371" text-anchor="middle" fill="#fff7ed" font-size="11">chunk size hotspots</text>
  </g>

  <!-- Down arrow -->
  <path d="M 600 400 L 600 430" stroke="#94a3b8" stroke-width="2" marker-end="url(#ar)"/>

  <!-- ===== LAYER 3: OPTIMIZATION STRATEGY ===== -->
  <text x="60" y="450" fill="#c4b5fd" font-size="13" font-weight="700">OPTIMIZATION STRATEGY</text>
  <rect x="50" y="458" width="6" height="170" fill="url(#opt)" rx="3"/>

  <g filter="url(#soft2)">
    <rect x="80" y="465" width="250" height="75" rx="12" fill="url(#opt)"/>
    <text x="205" y="492" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">Bundle Splitting</text>
    <text x="205" y="512" text-anchor="middle" fill="#ede9fe" font-size="11">manual chunks via Rollup</text>
    <text x="205" y="528" text-anchor="middle" fill="#ede9fe" font-size="11">vendor / feature boundaries</text>
  </g>

  <g filter="url(#soft2)">
    <rect x="350" y="465" width="250" height="75" rx="12" fill="url(#opt)"/>
    <text x="475" y="492" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">Lazy + Suspense</text>
    <text x="475" y="512" text-anchor="middle" fill="#ede9fe" font-size="11">route + heavy-component</text>
    <text x="475" y="528" text-anchor="middle" fill="#ede9fe" font-size="11">code splitting · error boundaries</text>
  </g>

  <g filter="url(#soft2)">
    <rect x="620" y="465" width="250" height="75" rx="12" fill="url(#opt)"/>
    <text x="745" y="492" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">Memoization</text>
    <text x="745" y="512" text-anchor="middle" fill="#ede9fe" font-size="11">React.memo · useCallback</text>
    <text x="745" y="528" text-anchor="middle" fill="#ede9fe" font-size="11">useMemo at Context layers</text>
  </g>

  <g filter="url(#soft2)">
    <rect x="890" y="465" width="250" height="75" rx="12" fill="url(#opt)"/>
    <text x="1015" y="492" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">CSS &amp; Animation Audit</text>
    <text x="1015" y="512" text-anchor="middle" fill="#ede9fe" font-size="11">eliminate expensive repaints</text>
    <text x="1015" y="528" text-anchor="middle" fill="#ede9fe" font-size="11">GPU-friendly transforms</text>
  </g>

  <g filter="url(#soft2)">
    <rect x="215" y="555" width="360" height="65" rx="12" fill="url(#opt)"/>
    <text x="395" y="583" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">Rollup Tuning</text>
    <text x="395" y="603" text-anchor="middle" fill="#ede9fe" font-size="11">tree-shake · compress · preload directives</text>
  </g>

  <g filter="url(#soft2)">
    <rect x="625" y="555" width="360" height="65" rx="12" fill="url(#opt)"/>
    <text x="805" y="583" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">Context Discipline</text>
    <text x="805" y="603" text-anchor="middle" fill="#ede9fe" font-size="11">stable refs · no flicker on re-mount</text>
  </g>

  <!-- Down arrow -->
  <path d="M 600 635 L 600 665" stroke="#94a3b8" stroke-width="2" marker-end="url(#ar)"/>

  <!-- ===== OUTCOME ===== -->
  <g filter="url(#soft2)">
    <rect x="150" y="680" width="900" height="75" rx="12" fill="url(#outcome)"/>
    <text x="600" y="710" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">Production Outcome</text>
    <text x="600" y="732" text-anchor="middle" fill="#d1fae5" font-size="12">smaller initial bundle · fast TTI · steady FPS · no UI flicker · green Lighthouse scores</text>
  </g>
</svg>
