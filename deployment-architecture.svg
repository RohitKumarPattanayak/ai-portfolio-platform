<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 880" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <linearGradient id="dbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="dev" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
    <linearGradient id="prod" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="db" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <marker id="a1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#cbd5e1"/>
    </marker>
    <filter id="soft3" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feOffset dx="0" dy="2" result="o"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1280" height="880" fill="url(#dbg)"/>

  <!-- Title -->
  <text x="640" y="42" text-anchor="middle" fill="#f8fafc" font-size="24" font-weight="700">Deployment Architecture — Development &amp; Production</text>
  <text x="640" y="68" text-anchor="middle" fill="#94a3b8" font-size="13">local docker compose · AWS production with managed Postgres</text>

  <!-- Divider -->
  <line x1="640" y1="95" x2="640" y2="855" stroke="#334155" stroke-width="1" stroke-dasharray="6,6"/>

  <!-- ========= DEVELOPMENT (LEFT) ========= -->
  <g filter="url(#soft3)">
    <rect x="30" y="100" width="580" height="48" rx="10" fill="url(#dev)"/>
    <text x="320" y="130" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">🛠  DEVELOPMENT · local</text>
  </g>

  <!-- Dev: Developer -->
  <g filter="url(#soft3)">
    <circle cx="80" cy="220" r="35" fill="#334155" stroke="#0ea5e9" stroke-width="2"/>
    <text x="80" y="225" text-anchor="middle" fill="#f1f5f9" font-size="12" font-weight="700">Dev</text>
  </g>

  <!-- Docker Compose wrapper -->
  <rect x="140" y="165" width="460" height="430" rx="14" fill="none" stroke="#0ea5e9" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="160" y="185" fill="#7dd3fc" font-size="12" font-weight="700">docker-compose · local network</text>

  <!-- Frontend dev -->
  <g filter="url(#soft3)">
    <rect x="170" y="210" width="180" height="80" rx="12" fill="url(#dev)"/>
    <text x="260" y="238" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">Vite Dev Server</text>
    <text x="260" y="258" text-anchor="middle" fill="#e0f2fe" font-size="11">React + HMR</text>
    <text x="260" y="275" text-anchor="middle" fill="#e0f2fe" font-size="11">:5173</text>
  </g>

  <!-- Backend dev -->
  <g filter="url(#soft3)">
    <rect x="390" y="210" width="190" height="80" rx="12" fill="url(#dev)"/>
    <text x="485" y="238" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">FastAPI + Uvicorn</text>
    <text x="485" y="258" text-anchor="middle" fill="#e0f2fe" font-size="11">hot reload · SQLAlchemy</text>
    <text x="485" y="275" text-anchor="middle" fill="#e0f2fe" font-size="11">:8000</text>
  </g>

  <!-- Alembic -->
  <g filter="url(#soft3)">
    <rect x="390" y="310" width="190" height="55" rx="12" fill="#334155" stroke="#0ea5e9"/>
    <text x="485" y="333" text-anchor="middle" fill="#f1f5f9" font-size="12" font-weight="700">Alembic migrations</text>
    <text x="485" y="352" text-anchor="middle" fill="#cbd5e1" font-size="10">run on startup</text>
  </g>

  <!-- Postgres master -->
  <g filter="url(#soft3)">
    <rect x="170" y="390" width="180" height="80" rx="12" fill="url(#db)"/>
    <text x="260" y="418" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">Postgres Master</text>
    <text x="260" y="438" text-anchor="middle" fill="#d1fae5" font-size="11">pgvector extension</text>
    <text x="260" y="455" text-anchor="middle" fill="#d1fae5" font-size="11">:5432</text>
  </g>

  <!-- Postgres replica -->
  <g filter="url(#soft3)">
    <rect x="390" y="390" width="190" height="80" rx="12" fill="url(#db)" opacity="0.85"/>
    <text x="485" y="418" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">Postgres Replica</text>
    <text x="485" y="438" text-anchor="middle" fill="#d1fae5" font-size="11">streaming replication</text>
    <text x="485" y="455" text-anchor="middle" fill="#d1fae5" font-size="11">:5433</text>
  </g>

  <!-- OpenAI dev -->
  <g filter="url(#soft3)">
    <rect x="280" y="505" width="200" height="65" rx="12" fill="#334155" stroke="#64748b"/>
    <text x="380" y="530" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="700">OpenAI API</text>
    <text x="380" y="550" text-anchor="middle" fill="#cbd5e1" font-size="11">direct HTTPS</text>
  </g>

  <!-- Dev arrows -->
  <line x1="115" y1="220" x2="170" y2="240" stroke="#cbd5e1" stroke-width="2" marker-end="url(#a1)"/>
  <line x1="350" y1="250" x2="390" y2="250" stroke="#cbd5e1" stroke-width="2" marker-end="url(#a1)"/>
  <line x1="485" y1="290" x2="485" y2="310" stroke="#cbd5e1" stroke-width="2" marker-end="url(#a1)"/>
  <line x1="485" y1="365" x2="485" y2="390" stroke="#cbd5e1" stroke-width="2" marker-end="url(#a1)"/>
  <line x1="390" y1="430" x2="350" y2="430" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#a1)"/>
  <text x="370" y="422" text-anchor="middle" fill="#94a3b8" font-size="10">replication</text>
  <line x1="460" y1="290" x2="400" y2="505" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#a1)"/>

  <!-- Dev caption -->
  <text x="320" y="630" text-anchor="middle" fill="#7dd3fc" font-size="12" font-weight="700">One-command spin-up</text>
  <text x="320" y="650" text-anchor="middle" fill="#cbd5e1" font-size="11">docker-compose up → full stack running locally</text>
  <text x="320" y="668" text-anchor="middle" fill="#cbd5e1" font-size="11">identical schema &amp; replica topology as production</text>

  <!-- ========= PRODUCTION (RIGHT) ========= -->
  <g filter="url(#soft3)">
    <rect x="670" y="100" width="580" height="48" rx="10" fill="url(#prod)"/>
    <text x="960" y="130" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">🚀  PRODUCTION · cloud</text>
  </g>

  <!-- User -->
  <g filter="url(#soft3)">
    <circle cx="710" cy="200" r="30" fill="#334155" stroke="#f97316" stroke-width="2"/>
    <text x="710" y="205" text-anchor="middle" fill="#f1f5f9" font-size="11" font-weight="700">User</text>
  </g>

  <!-- Domain -->
  <g filter="url(#soft3)">
    <rect x="770" y="175" width="160" height="55" rx="12" fill="url(#edge)"/>
    <text x="850" y="199" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">Custom Domain</text>
    <text x="850" y="218" text-anchor="middle" fill="#ede9fe" font-size="11">DNS · host mapping</text>
  </g>

  <!-- Cloudflare -->
  <g filter="url(#soft3)">
    <rect x="950" y="175" width="160" height="55" rx="12" fill="url(#edge)"/>
    <text x="1030" y="199" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">Cloudflare CDN</text>
    <text x="1030" y="218" text-anchor="middle" fill="#ede9fe" font-size="11">DDoS · WAF · cache</text>
  </g>

  <!-- CloudFront -->
  <g filter="url(#soft3)">
    <rect x="1130" y="175" width="120" height="55" rx="12" fill="url(#edge)"/>
    <text x="1190" y="199" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">CloudFront</text>
    <text x="1190" y="218" text-anchor="middle" fill="#ede9fe" font-size="11">AWS edge</text>
  </g>

  <line x1="740" y1="200" x2="770" y2="200" stroke="#cbd5e1" stroke-width="2" marker-end="url(#a1)"/>
  <line x1="930" y1="202" x2="950" y2="202" stroke="#cbd5e1" stroke-width="2" marker-end="url(#a1)"/>
  <line x1="1110" y1="202" x2="1130" y2="202" stroke="#cbd5e1" stroke-width="2" marker-end="url(#a1)"/>

  <!-- Frontend S3 -->
  <g filter="url(#soft3)">
    <rect x="710" y="270" width="240" height="90" rx="12" fill="url(#prod)"/>
    <text x="830" y="299" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">Frontend · S3 Static</text>
    <text x="830" y="320" text-anchor="middle" fill="#fed7aa" font-size="11">React build output</text>
    <text x="830" y="337" text-anchor="middle" fill="#fed7aa" font-size="11">served via CloudFront</text>
    <text x="830" y="354" text-anchor="middle" fill="#fed7aa" font-size="11">code-split chunks · cache-busting</text>
  </g>

  <!-- Backend Lambda -->
  <g filter="url(#soft3)">
    <rect x="980" y="270" width="270" height="90" rx="12" fill="url(#prod)"/>
    <text x="1115" y="299" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">Backend · AWS Lambda + Magnus</text>
    <text x="1115" y="320" text-anchor="middle" fill="#fed7aa" font-size="11">FastAPI (Uvicorn adapter)</text>
    <text x="1115" y="337" text-anchor="middle" fill="#fed7aa" font-size="11">SQLAlchemy · async handlers</text>
    <text x="1115" y="354" text-anchor="middle" fill="#fed7aa" font-size="11">autoscaling · pay-per-request</text>
  </g>

  <!-- Arrows from CF down -->
  <path d="M 1030 230 L 1030 260 L 830 260 L 830 270" stroke="#cbd5e1" stroke-width="2" fill="none" marker-end="url(#a1)"/>
  <path d="M 1190 230 L 1190 260 L 1115 260 L 1115 270" stroke="#cbd5e1" stroke-width="2" fill="none" marker-end="url(#a1)"/>

  <!-- DB section -->
  <g filter="url(#soft3)">
    <rect x="820" y="405" width="240" height="90" rx="12" fill="url(#db)"/>
    <text x="940" y="434" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">Neon Postgres (primary)</text>
    <text x="940" y="455" text-anchor="middle" fill="#d1fae5" font-size="11">pgvector · HNSW index</text>
    <text x="940" y="472" text-anchor="middle" fill="#d1fae5" font-size="11">serverless · branchable</text>
  </g>

  <g filter="url(#soft3)">
    <rect x="1085" y="405" width="165" height="90" rx="12" fill="url(#db)" opacity="0.85"/>
    <text x="1167" y="434" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">Live Read Replica</text>
    <text x="1167" y="455" text-anchor="middle" fill="#d1fae5" font-size="11">analytics +</text>
    <text x="1167" y="472" text-anchor="middle" fill="#d1fae5" font-size="11">RAG retrieval</text>
  </g>

  <line x1="1115" y1="360" x2="940" y2="405" stroke="#cbd5e1" stroke-width="2" marker-end="url(#a1)"/>
  <line x1="1085" y1="450" x2="1060" y2="450" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#a1)"/>
  <text x="1072" y="443" text-anchor="middle" fill="#94a3b8" font-size="10">repl</text>

  <!-- OpenAI prod -->
  <g filter="url(#soft3)">
    <rect x="1030" y="530" width="220" height="60" rx="12" fill="#334155" stroke="#64748b"/>
    <text x="1140" y="553" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="700">OpenAI API</text>
    <text x="1140" y="572" text-anchor="middle" fill="#cbd5e1" font-size="11">embeddings + chat completions</text>
  </g>

  <line x1="1140" y1="360" x2="1140" y2="530" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#a1)"/>

  <!-- Observability -->
  <g filter="url(#soft3)">
    <rect x="710" y="530" width="290" height="60" rx="12" fill="#334155" stroke="#f97316"/>
    <text x="855" y="553" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="700">Observability &amp; Token Audit</text>
    <text x="855" y="572" text-anchor="middle" fill="#cbd5e1" font-size="11">CloudWatch logs · metrics · cost tracking</text>
  </g>

  <!-- CI/CD lane -->
  <g filter="url(#soft3)">
    <rect x="670" y="640" width="580" height="95" rx="12" fill="#1e293b" stroke="#475569"/>
    <text x="960" y="668" text-anchor="middle" fill="#fde68a" font-size="14" font-weight="700">CI / CD Pipeline</text>
    <text x="960" y="690" text-anchor="middle" fill="#e2e8f0" font-size="12">GitHub → build (Vite) → test → deploy</text>
    <text x="960" y="710" text-anchor="middle" fill="#cbd5e1" font-size="11">frontend → sync to S3 + invalidate CloudFront</text>
    <text x="960" y="726" text-anchor="middle" fill="#cbd5e1" font-size="11">backend → package → push to Lambda (Magnus)</text>
  </g>

  <!-- Common footer -->
  <g filter="url(#soft3)">
    <rect x="30" y="765" width="1220" height="75" rx="12" fill="url(#edge)" opacity="0.9"/>
    <text x="640" y="793" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">Shared Guarantees Across Environments</text>
    <text x="640" y="815" text-anchor="middle" fill="#ede9fe" font-size="12">same ORM &amp; migrations · identical read-replica topology · HNSW pgvector index · audited token usage · parity between local &amp; prod behaviour</text>
  </g>
</svg>
